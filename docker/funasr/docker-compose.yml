# FunASR 离线语音转写服务
# 中文语音识别（VAD + ASR + 标点 + 时间戳）
#
# 使用方法：
#   docker compose up -d          启动服务
#   docker compose logs -f        查看日志
#   docker compose down           停止服务
#
# 首次启动会自动下载模型（约 1-2 GB），之后秒启
# 服务就绪后，WebSocket 端口：ws://localhost:10095

services:
  funasr:
    image: registry.cn-hangzhou.aliyuncs.com/funasr_repo/funasr:funasr-runtime-sdk-cpu-0.4.7
    container_name: funasr-server
    ports:
      - "10095:10095"
    privileged: true
    volumes:
      # 模型缓存（避免每次重新下载）
      - ./models:/workspace/models
      # 热词文件（提升专有名词识别准确率）
      - ./hotwords.txt:/workspace/models/hotwords.txt
    entrypoint: ["bash", "-c"]
    command:
      - |
        set -e
        echo "=== FunASR 离线转写服务启动中 ==="
        cd /workspace/FunASR/runtime
        bash run_server.sh \
          --download-model-dir /workspace/models \
          --vad-dir damo/speech_fsmn_vad_zh-cn-16k-common-onnx \
          --model-dir damo/speech_paraformer-large-vad-punc_asr_nat-zh-cn-16k-common-vocab8404-onnx \
          --punc-dir damo/punc_ct-transformer_cn-en-common-vocab471067-large-onnx \
          --lm-dir damo/speech_ngram_lm_zh-cn-ai-wesp-fst \
          --itn-dir thuduj12/fst_itn_zh \
          --hotword /workspace/models/hotwords.txt \
          --certfile 0
        echo "=== FunASR 服务已启动 ==="
        tail -f /dev/null
    restart: unless-stopped
